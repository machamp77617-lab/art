<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
a { text-decoration: none; color: inherit; }

:root {
  --serif: 'EB Garamond', Georgia, serif;
  --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  cursor: pointer;
}

/* FULL SCREEN BG */
.splash {
  position: fixed;
  inset: 0;
  background: #111;
}

.splash-img {
  position: absolute;
  inset: 0;
  background-image: url('splash-bg.jpg');
  background-size: cover;
  background-position: center 30%;
  opacity: 0;
  animation: fadeImg 2s ease 0.3s forwards;
}

/* dark overlay — subtle */
.splash-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.45) 0%,
    rgba(0,0,0,0.1) 60%,
    rgba(0,0,0,0.3) 100%
  );
}

/* NAME — bottom left */
.splash-name {
  position: absolute;
  bottom: 3.5rem;
  left: 3.5rem;
  opacity: 0;
  animation: fadeUp 1.2s ease 1s forwards;
}

.splash-name h1 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(2.2rem, 5vw, 4rem);
  color: #fff;
  letter-spacing: 0.02em;
  line-height: 1;
}

.splash-name p {
  font-family: var(--sans);
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin-top: 0.6rem;
}

/* CLICK HINT — bottom center */
.splash-hint {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--sans);
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  opacity: 0;
  animation: fadeIn 1s ease 2s forwards;
  white-space: nowrap;
}

/* RIGHT NAV */
.splash-nav {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 72px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
  border-left: 1px solid rgba(255,255,255,0.12);
  background: rgba(0,0,0,0.15);
  backdrop-filter: blur(4px);
  opacity: 0;
  animation: fadeIn 1s ease 1.4s forwards;
}

.splash-nav a {
  font-family: var(--sans);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  transition: color 0.25s;
  padding: 0.5rem 0;
  cursor: pointer;
}

.splash-nav a:hover {
  color: #fff;
}

.splash-nav .nav-divider {
  width: 1px;
  height: 32px;
  background: rgba(255,255,255,0.2);
}

/* TRANSITION OUT */
.splash.out {
  animation: splashOut 0.6s ease forwards;
  pointer-events: none;
}

/* ANIMATIONS */
@keyframes fadeImg {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes splashOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}

/* MOBILE */
@media (max-width: 600px) {
  .splash-name { left: 1.5rem; bottom: 3rem; }
  .splash-nav { width: 52px; gap: 2rem; }
  .splash-nav a { font-size: 0.55rem; }
}

</style>
</head>

  </nav>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheng Shi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
a { text-decoration: none; color: inherit; }

:root {
  --serif: 'EB Garamond', Georgia, serif;
  --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  cursor: pointer;
}

/* FULL SCREEN BG */
.splash {
  position: fixed;
  inset: 0;
  height: 100dvh;
  background: #111;
}

.splash-img {
  position: absolute;
  inset: 0;
  background-image: url('splash-bg.jpg');
  background-size: cover;
  background-position: center 30%;
  opacity: 0;
  animation: fadeImg 2s ease 0.3s forwards;
}

/* dark overlay */
.splash-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.45) 0%,
    rgba(0,0,0,0.1) 60%,
    rgba(0,0,0,0.3) 100%
  );
}

/* NAME — bottom left */
.splash-name {
  position: absolute;
  bottom: 3.5rem;
  left: 3.5rem;
  opacity: 0;
  animation: fadeUp 1.2s ease 1s forwards;
}

.splash-name h1 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(2.2rem, 5vw, 4rem);
  color: #fff;
  letter-spacing: 0.02em;
  line-height: 1;
}

.splash-name p {
  font-family: var(--sans);
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin-top: 0.6rem;
}

/* TAP/CLICK HINT — bottom center */
.splash-hint {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--sans);
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  opacity: 0;
  animation: fadeIn 1s ease 2s forwards;
  white-space: nowrap;
}

/* RIGHT NAV — desktop only */
.splash-nav {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 72px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
  border-left: 1px solid rgba(255,255,255,0.12);
  background: rgba(0,0,0,0.15);
  backdrop-filter: blur(4px);
  opacity: 0;
  animation: fadeIn 1s ease 1.4s forwards;
}

.splash-nav a {
  font-family: var(--sans);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  transition: color 0.25s;
  padding: 0.5rem 0;
  cursor: pointer;
}

.splash-nav a:hover { color: #fff; }

.splash-nav .nav-divider {
  width: 1px;
  height: 32px;
  background: rgba(255,255,255,0.2);
}

/* TRANSITION OUT */
.splash.out {
  animation: splashOut 0.6s ease forwards;
  pointer-events: none;
}

/* ANIMATIONS */
@keyframes fadeImg {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes splashOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}

/* MOBILE */
@media (max-width: 600px) {
  .splash-name {
    left: 1.5rem;
    bottom: 5rem;
  }
  .splash-hint {
    bottom: 2.8rem;
  }
  .splash-nav {
    display: none;
  }
  .splash-nav-mobile {
    display: flex !important;
  }
}

/* MOBILE BOTTOM NAV */
.splash-nav-mobile {
  display: none;
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 48px;
  flex-direction: row;
  align-items: center;
  justify-content: space-around;
  border-top: 1px solid rgba(255,255,255,0.12);
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(4px);
  opacity: 0;
  animation: fadeIn 1s ease 1.4s forwards;
}

.splash-nav-mobile a {
  font-family: var(--sans);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  padding: 0 1rem;
  height: 100%;
  display: flex;
  align-items: center;
  cursor: pointer;
}

.splash-nav-mobile a:active { color: #fff; }

</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-img"></div>
  <div class="splash-overlay"></div>

  <div class="splash-name">
    <h1>Sheng Shi</h1>
    <p>Artist, London</p>
  </div>

  <div class="splash-hint" id="splash-hint">Click anywhere to enter</div>

  <nav class="splash-nav" onclick="event.stopPropagation()">
    <a href="sheng-shi.html#works">Works</a>
    <div class="nav-divider"></div>
    <a href="about.html">About</a>
    <a href="practice.html">Practice</a>
    <div class="nav-divider"></div>
    <a href="contact.html">Contact</a>
  </nav>

  <nav class="splash-nav-mobile" ontouchstart="event.stopPropagation()" onclick="event.stopPropagation()">
    <a href="sheng-shi.html#works">Works</a>
    <a href="about.html">About</a>
    <a href="practice.html">Practice</a>
    <a href="contact.html">Contact</a>
  </nav>
</div>

<script>
  // Update hint text for touch devices
  if ('ontouchstart' in window) {
    document.getElementById('splash-hint').textContent = 'Tap anywhere to enter';
  }

  function enterSite() {
    var splash = document.getElementById('splash');
    splash.classList.add('out');
    setTimeout(function() {
      window.location.href = 'sheng-shi.html';
    }, 600);
  }

  var splash = document.getElementById('splash');

  // Desktop click
  splash.addEventListener('click', function(e) {
    if (e.target.tagName === 'A') return;
    enterSite();
  });

  // Mobile touch
  splash.addEventListener('touchend', function(e) {
    if (e.target.tagName === 'A') return;
    e.preventDefault();
    enterSite();
  }, { passive: false });
</script>

</body>
</html>

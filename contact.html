<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Sheng Shi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }

:root {
  --white: #ffffff;
  --black: #000000;
  --grey: #888;
  --light-grey: #e0e0e0;
  --serif: 'EB Garamond', Georgia, serif;
  --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html { scroll-behavior: smooth; }
body {
  background: var(--white);
  color: var(--black);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: var(--white);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 2rem;
  height: 48px;
  border-bottom: 1px solid var(--light-grey);
}
.nav-logo {
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 400;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 2rem;
}
.nav-right a {
  font-family: var(--sans);
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  transition: color 0.2s;
}
.nav-right a:hover { color: var(--grey); }

/* BACK BREADCRUMB */
.breadcrumb {
  margin-top: 48px;
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--light-grey);
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-family: var(--sans);
  font-size: 0.68rem;
  color: var(--grey);
  letter-spacing: 0.05em;
}
.breadcrumb a { color: var(--grey); transition: color 0.2s; }
.breadcrumb a:hover { color: var(--black); }
.breadcrumb span { color: var(--black); }

/* HERO IMAGE */
.work-hero {
  width: 100%;
  max-height: 80vh;
  overflow: hidden;
  background: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: center;
}
.work-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  max-height: 80vh;
}
.work-hero-placeholder {
  width: 100%;
  height: 60vh;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.work-hero-placeholder span {
  font-family: var(--sans);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: #bbb;
  text-transform: uppercase;
}

/* MAIN LAYOUT */
.work-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--light-grey);
}

/* LEFT: info */
.work-info {
  padding: 3rem 2rem 4rem;
  border-right: 1px solid var(--light-grey);
  position: sticky;
  top: 48px;
  align-self: start;
}
.work-project {
  font-family: var(--sans);
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 1rem;
}
.work-title {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 3vw, 2.8rem);
  font-weight: 400;
  font-style: italic;
  line-height: 1.2;
  margin-bottom: 1.5rem;
}
.work-title.named { font-style: normal; font-weight: 500; }
.work-meta {
  margin-bottom: 2rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--light-grey);
}
.work-meta-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 0.5rem;
  padding: 0.4rem 0;
}
.work-meta-label {
  font-family: var(--sans);
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--grey);
  padding-top: 0.1rem;
}
.work-meta-value {
  font-family: var(--sans);
  font-size: 1.05rem;
  line-height: 1.5;
}
.work-desc {
  font-family: var(--sans);
  font-size: 1.15rem;
  line-height: 1.8;
  color: var(--black);
}
.work-desc p + p {
  margin-top: 1em;
}

/* RIGHT: images */
.work-images {
  padding: 3rem 2rem 4rem;
}
.work-images-label {
  font-family: var(--sans);
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--light-grey);
}
.image-grid {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--light-grey);
}
.image-slot {
  background: var(--white);
  overflow: hidden;
  cursor: zoom-in;
}
.image-slot img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
}
.image-slot:hover img { transform: scale(1.02); }
.image-slot-placeholder {
  width: 100%;
  aspect-ratio: 4/3;
  background: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0.5rem;
}
.image-slot-placeholder span {
  font-family: var(--sans);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: #ccc;
  text-transform: uppercase;
}
.image-caption {
  padding: 0.6rem 0 1rem;
  font-family: var(--sans);
  font-size: 0.75rem;
  color: var(--grey);
  letter-spacing: 0.03em;
}

/* ADD IMAGE NOTE */
.add-image-note {
  margin-top: 2rem;
  padding: 1rem;
  border: 1px dashed var(--light-grey);
  text-align: center;
}
.add-image-note span {
  font-family: var(--sans);
  font-size: 0.63rem;
  letter-spacing: 0.1em;
  color: #ccc;
  text-transform: uppercase;
}

/* NAV BETWEEN WORKS */
.work-nav {
  border-top: 1px solid var(--light-grey);
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.work-nav-item {
  padding: 1.5rem 2rem;
  transition: background 0.15s;
  cursor: pointer;
}
.work-nav-item:hover { background: #f8f8f8; }
.work-nav-item.next { border-left: 1px solid var(--light-grey); text-align: right; }
.work-nav-label {
  font-family: var(--sans);
  font-size: 0.63rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 0.4rem;
}
.work-nav-title {
  font-family: var(--sans);
  font-style: italic;
  font-size: 0.95rem;
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 9000;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
}
.lightbox-close {
  position: fixed;
  top: 1.5rem; right: 2rem;
  background: none; border: none;
  color: white; font-family: var(--sans);
  font-size: 0.75rem; cursor: pointer;
  opacity: 0.5; letter-spacing: 0.1em;
  transition: opacity 0.2s;
}
.lightbox-close:hover { opacity: 1; }

/* FOOTER */
footer {
  padding: 2rem;
  display: flex;
  justify-content: space-between;
  border-top: 1px solid var(--light-grey);
}
.footer-copy {
  font-family: var(--sans);
  font-size: 0.68rem;
  color: var(--grey);
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .work-body { grid-template-columns: 1fr; }
  .work-info {
    position: static;
    border-right: none;
    border-bottom: 1px solid var(--light-grey);
    padding: 2rem 1rem;
  }
  .work-images { padding: 2rem 1rem; }
  nav { padding: 0 1rem; }
  .breadcrumb { padding: 1rem; }
  .work-nav-item { padding: 1rem; }
}


.contact-page {
  margin-top: 48px;
  min-height: calc(100vh - 48px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
}

.contact-inner {
  max-width: 480px;
  width: 100%;
}

.contact-label {
  font-family: var(--sans);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 2.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--light-grey);
}

.contact-row {
  padding: 1.2rem 0;
  border-bottom: 1px solid var(--light-grey);
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 1rem;
  align-items: baseline;
}

.contact-row-label {
  font-family: var(--sans);
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--grey);
}

.contact-row-value {
  font-family: var(--serif);
  font-size: 1.05rem;
}

.contact-row-value a {
  color: var(--black);
  transition: color 0.2s;
}

.contact-row-value a:hover {
  color: var(--grey);
}
</style>
</head>
